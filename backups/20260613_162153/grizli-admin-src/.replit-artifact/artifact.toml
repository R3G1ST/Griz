kind = "web"
previewPath = "/admin/"
title = "ГРИЗЛИ — Администратор"
version = "1.0.0"
id = "artifacts/grizli-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 18736

[services.development]
run = "pnpm --filter @workspace/grizli-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grizli-admin", "run", "build" ]
publicDir = "artifacts/grizli-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18736"
BASE_PATH = "/admin/"
