kind = "web"
previewPath = "/"
title = "Гризли — Кальянная"
version = "1.0.0"
id = "artifacts/grizli"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19159

[services.development]
run = "pnpm --filter @workspace/grizli run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grizli", "run", "build" ]
publicDir = "artifacts/grizli/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19159"
BASE_PATH = "/"
