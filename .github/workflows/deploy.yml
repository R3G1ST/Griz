name: Deploy to Server

on:
  push:
    branches: [feature/pro-api]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/Griz
            git pull origin feature/pro-api

            # Собираем API
            cd artifacts/api-v2
            pnpm install --frozen-lockfile
            pnpm run build

            # Копируем index.html в выходную папку ПОСЛЕ сборки
            OUTDIR=$(node -e "const t=require('./tsconfig.json');console.log(t.compilerOptions.outDir||'dist')" 2>/dev/null || echo "dist")
            mkdir -p "$OUTDIR/public"
            cp src/public/index.html "$OUTDIR/public/index.html"

            sudo systemctl restart grizli-api-v2

            # Собираем Docs
            cd ../docs-site
            pnpm install --frozen-lockfile
            pnpm run build
            python3 apply-theme.py

            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployed successfully"
