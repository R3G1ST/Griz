name: Deploy to Server

on:
  push:
    branches: [feature/pro-api]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/Griz
            git pull origin feature/pro-api

            # Копируем свежий index.html ДО сборки
            mkdir -p artifacts/api-v2/public
            cp artifacts/api-v2/src/public/index.html artifacts/api-v2/public/index.html

            # Пересобираем API
            cd artifacts/api-v2
            pnpm install --frozen-lockfile
            pnpm run build
            sudo systemctl restart grizli-api-v2

            # Пересобираем Docs
            cd ../docs-site
            pnpm install --frozen-lockfile
            pnpm run build
            python3 apply-theme.py

            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployed successfully"
